name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-compiler:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [gcc, clang]

    steps:
    - uses: actions/checkout@v4

    - name: Free up disk space (build-compiler)
      run: |
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        sudo rm -rf /var/cache/apt/archives/*
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo rm -rf /usr/share/android-sdk
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/swift
        sudo docker rmi $(docker images -q) 2>/dev/null || true
        sudo rm -rf /tmp/*
        df -h

    - name: Install minimal LLVM dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          llvm-14 \
          llvm-14-dev \
          libllvm14 \
          libzstd-dev \
          cmake \
          build-essential
        sudo apt-get clean
        df -h

    - name: Configure
      run: |
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DLLVM_CONFIG_EXECUTABLE=/usr/bin/llvm-config-14

    - name: Build Proxima
      run: |
        cd build
        make -j$(nproc) proxima

    - name: Test Proxima
      run: |
        cd build
        ctest --output-on-failure --tests-regex "proxima.*"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: proxima-${{ matrix.os }}
        path: build/proxima/proxima

  build-ide:
    runs-on: ${{ matrix.os }}
    needs: build-compiler
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [gcc, clang]

    steps:
    - uses: actions/checkout@v4

    - name: Free up disk space (build-ide)
      run: |
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        sudo rm -rf /var/cache/apt/archives/*
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo rm -rf /usr/share/android-sdk
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/swift
        sudo docker rmi $(docker images -q) 2>/dev/null || true
        sudo rm -rf /tmp/*
        df -h

    - name: Install minimal Qt6 dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          qt6-base-dev \
          qt6-base-private-dev \
          libqt6widgets6 \
          libqt6network6 \
          libqt6gui6 \
          libqt6core6 \
          cmake \
          build-essential
        sudo apt-get clean
        df -h

    - name: Configure
      run: |
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=/usr/lib/x86_64-linux-gnu/cmake/Qt6

    - name: Build Centauri
      run: |
        cd build
        make -j$(nproc) centauri

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: centauri-${{ matrix.os }}
        path: build/centauri/centauri

  release:
    runs-on: ubuntu-latest
    needs: [build-compiler, build-ide]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4

    - name: Create release package
      run: |
        mkdir release
        cp -r proxima-*/* release/
        cp -r centauri-*/* release/
        tar -czf proxima-centauri-${{ github.ref_name }}.tar.gz release/

    - name: Create Release
      uses: softprops/action-gh-release@v4
      with:
        files: proxima-centauri-*.tar.gz
        draft: false
        prerelease: false
