name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-compiler:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [gcc, clang]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y llvm qt6-base-dev

    - name: Configure
      run: |
        cd proxima
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

    - name: Build
      run: |
        cd proxima/build
        make -j$(nproc)

    - name: Test
      run: |
        cd proxima/build
        ctest --output-on-failure

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: proxima-${{ matrix.os }}
        path: proxima/build/proxima

  build-ide:
    runs-on: ${{ matrix.os }}
    needs: build-compiler
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [gcc, clang]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y qt6-base-dev

    - name: Configure
      run: |
        cd centauri
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd centauri/build
        make -j$(nproc)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: centauri-${{ matrix.os }}
        path: centauri/build/centauri

  release:
    runs-on: ubuntu-latest
    needs: [build-compiler, build-ide]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4

    - name: Create release package
      run: |
        mkdir release
        cp -r proxima-*/* release/
        cp -r centauri-*/* release/
        tar -czf proxima-centauri-${{ github.ref_name }}.tar.gz release/

    - name: Create Release
      uses: softprops/action-gh-release@v4
      with:
        files: proxima-centauri-*.tar.gz
        draft: false
        prerelease: false
