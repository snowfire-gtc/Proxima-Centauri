name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-compiler:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [gcc, clang]

    steps:
    - uses: actions/checkout@v4

    - name: Free up disk space
      run: |
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Install minimal LLVM dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          llvm-dev \
          libllvm14 \
          cmake \
          build-essential
        sudo apt-get clean
        df -h

    - name: Configure
      run: |
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

    - name: Build Proxima
      run: |
        cd build
        make -j$(nproc) proxima

    - name: Test Proxima
      run: |
        cd build
        ctest --output-on-failure --tests-regex "proxima.*"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: proxima-${{ matrix.os }}
        path: build/proxima/proxima

  build-ide:
    runs-on: ${{ matrix.os }}
    needs: build-compiler
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [gcc, clang]

    steps:
    - uses: actions/checkout@v4

    - name: Free up disk space
      run: |
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h

    - name: Install minimal Qt6 dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          qt6-base-dev \
          libqt6widgets6 \
          libqt6network6 \
          cmake \
          build-essential
        sudo apt-get clean
        df -h

    - name: Configure
      run: |
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build Centauri
      run: |
        cd build
        make -j$(nproc) centauri

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: centauri-${{ matrix.os }}
        path: build/centauri/centauri

  release:
    runs-on: ubuntu-latest
    needs: [build-compiler, build-ide]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4

    - name: Create release package
      run: |
        mkdir release
        cp -r proxima-*/* release/
        cp -r centauri-*/* release/
        tar -czf proxima-centauri-${{ github.ref_name }}.tar.gz release/

    - name: Create Release
      uses: softprops/action-gh-release@v4
      with:
        files: proxima-centauri-*.tar.gz
        draft: false
        prerelease: false
